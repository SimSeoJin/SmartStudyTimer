//spring.application.name=smartstudytimer

# 1. DB 연결 정보 (주소, ID, PW)
# 만약 스키마 이름을 timer_db로 만드셨다면 아래 주소를 그대로 쓰시면 됩니다.
spring.datasource.url=jdbc:mysql://localhost:3306/smart_timer?serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=t!010209

# 2. MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA/Hibernate 설정
# update: 자바 코드(Entity)와 DB 테이블 구조를 자동으로 맞춰줍니다.
spring.jpa.hibernate.ddl-auto=update
# 콘솔에 실제 실행되는 SQL문을 예쁘게 보여줍니다. (테스트할 때 필수!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true